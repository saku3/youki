name: 🔍 Basic Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  LIMA_TEMPLATE: ubuntu-26.04

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      any_modified: ${{ steps.filter.outputs.any_modified }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get full history
      # Using Git commands instead of tj-actions/changed-files
      - name: Get changed files
        id: filter
        run: |
          # grep will exit with non-zero if no matching pattern
          # but we are ok with that, so to prevent workflow failing
          # we set allow errors
          set +e 

          # Change the base commit depending on event type
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events
            if [[ -n "${{ github.event.before }}" ]]; then
              BASE_COMMIT="${{ github.event.before }}"
            else
              # For workflow dispatch, etc.
              git fetch origin main --depth=1
              BASE_COMMIT="origin/main"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For pull request events
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE_COMMIT="origin/${{ github.base_ref }}"
          else
            # For workflow dispatch events
            git fetch origin main --depth=1
            BASE_COMMIT="HEAD~1"
          fi
          
          echo "Using base commit: $BASE_COMMIT"
          
          # Get changed files and filter out the ones to ignore
          ALL_CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_COMMIT" HEAD)
          FILTERED_FILES=$(echo "$ALL_CHANGED_FILES" | grep -v -E '^docs/|^LICENSE$|\.md$')
          
          # Set the results
          if [[ -n "$FILTERED_FILES" ]]; then
            echo "any_modified=true" >> $GITHUB_OUTPUT
            echo "all_modified_files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILTERED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "any_modified=false" >> $GITHUB_OUTPUT
            echo "all_modified_files=" >> $GITHUB_OUTPUT
          fi
      - name: List all changed files
        run: |
          if [[ "${{ steps.filter.outputs.any_modified }}" == "true" ]]; then
            echo "Changed files detected:"
            echo "${{ steps.filter.outputs.all_modified_files }}"
          else
            echo "No relevant changes detected"
          fi

  check:
    needs: [changes]
    if: needs.changes.outputs.any_modified == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        arch: [ "x86_64", "aarch64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt --profile minimal --no-self-update
      - name: typos-action
        uses: crate-ci/typos@v1.32.0
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install cross-rs
        run: RUSTFLAGS="" cargo install cross --git https://github.com/cross-rs/cross
      - name: Setup target
        run: |
          echo "CARGO=cross" >> ${GITHUB_ENV}
          echo "TARGET=${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}" >> ${GITHUB_ENV}
      - name: Check formatting and lints
        run: just lint
      - name: Install cargo machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete@0.7.0
      - name: Check unused deps
        run: cargo machete

  tests:
    needs: [changes]
    if: needs.changes.outputs.any_modified == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space (host)
        run: |
          # Free ~30GB on the GitHub Actions runner so the Lima VM disk
          # image has headroom for cargo target/ + Go build cache.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost /opt/microsoft /opt/google
          sudo apt-get clean
          df -h /
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default ./${{ env.LIMA_TEMPLATE }}.yaml
      - name: Stage repo in VM
        run: limactl cp -r . default:/var/tmp/youki
      - name: Provision VM (Rust + just + ci-prepare deps + test user)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential just pkg-config make git
          # Install youki build deps via the justfile recipe (libsystemd-dev,
          # libelf-dev, libseccomp-dev, libclang-dev, libssl-dev). For the musl
          # matrix variant also pull in musl-dev / musl-tools via the dedicated
          # recipe (which depends on ci-prepare).
          cd /var/tmp/youki
          if [ "${{ matrix.libc }}" = "musl" ]; then
            just ci-musl-prepare
          else
            just ci-prepare
          fi
          # Install Rust system-wide so the (non-root) test user can find the
          # toolchain. /root/.rustup is mode 700 and unreadable by other users,
          # so we place RUSTUP_HOME / CARGO_HOME under /usr/local instead.
          export RUSTUP_HOME=/usr/local/rustup
          export CARGO_HOME=/usr/local/cargo
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          rustup target add ${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}
          # Make toolchain readable & traversable for everyone
          chmod -R a+rX /usr/local/rustup /usr/local/cargo
          ln -sf /usr/local/cargo/bin/cargo  /usr/local/bin/cargo
          ln -sf /usr/local/cargo/bin/rustc  /usr/local/bin/rustc
          ln -sf /usr/local/cargo/bin/rustup /usr/local/bin/rustup
          # Test user (some unit tests require a non-root UID via TEST_NON_ROOT_UID)
          useradd -m -d /tmp/testuser testuser
          # Best-effort: relax AppArmor user-ns restriction if the kernel exposes it
          echo 0 > /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || true
          EOS
      # The test steps run as the (non-root) Lima default user. A bunch of
      # unit tests assume non-root execution: rootless_required() returns
      # false under root, which makes test_userns_spec_validation and
      # test_determine_root_path_rootless deviate from their expectations.
      - name: Run test-basic
        run: |
          cat <<'EOS' | lima bash -eux
          cd /var/tmp/youki
          export RUSTUP_HOME=/usr/local/rustup
          export TARGET=${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}
          export TEST_NON_ROOT_UID=$(id -u testuser)
          just test-basic
          EOS
      - name: Run test-features
        run: |
          cat <<'EOS' | lima bash -eux
          cd /var/tmp/youki
          export RUSTUP_HOME=/usr/local/rustup
          export TARGET=${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}
          just test-features
          EOS

  # We do not yet enforce some minimum coverage, and there were come codecov issues
  # so commenting this out for now. When we are ready to enforce coverage, uncomment 
