name: 🧪 e2e test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  LIMA_TEMPLATE: ubuntu-26.04

jobs:
  youki-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        arch: [ "x86_64", "aarch64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1.3.7
        env:
          RUST_CACHE_KEY_OS: rust-cache-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install cross-rs
        run: RUSTFLAGS="" cargo install cross --git https://github.com/cross-rs/cross
      - name: Setup target
        run: |
          echo "CARGO=cross" >> ${GITHUB_ENV}
          echo "TARGET=${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}" >> ${GITHUB_ENV}
      - name: Build youki
        run: just youki-release
      - name: Upload youki binary
        if: ${{ matrix.arch == 'x86_64' }}
        uses: actions/upload-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
          path: youki

  containerd-integration-tests:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 90
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (containerd build deps)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config make git curl ca-certificates software-properties-common \
            libsystemd-dev libelf-dev libseccomp-dev \
            btrfs-progs libbtrfs-dev gperf golang-go
          add-apt-repository -y ppa:criu/ppa
          apt-get install -y criu
          EOS
      - name: Build containerd in VM
          repository: containerd/containerd
          ref: v2.2.3
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'
          cache: true
      - run: sudo apt-get -y update
      - run: sudo apt-get install -y pkg-config libsystemd-dev libelf-dev libseccomp-dev btrfs-progs libbtrfs-dev gperf
      - name: Install CRIU from source
        run: |
          sudo apt-get install -y \
            libcap-dev libnet1-dev libnl-3-dev uuid-dev \
            libprotobuf-c-dev libprotobuf-dev protobuf-c-compiler protobuf-compiler
          git clone --depth 1 --branch criu-dev --single-branch \
            https://github.com/checkpoint-restore/criu.git ~/criu
          (cd ~/criu && sudo make -j $(nproc) install-criu)
          rm -rf ~/criu
          criu --version
      - name: Setup libseccomp
        run: sudo ./script/setup/install-seccomp
      - name: Build containerd
        run: |
          cat <<'EOS' | lima sudo bash -eux
          git clone --depth=1 --branch v2.2.3 https://github.com/containerd/containerd.git /root/containerd
          cd /root/containerd
          ./script/setup/install-seccomp
          make build
          make binaries
          make install
          ./script/setup/install-cni
          ./script/setup/install-critools
          EOS
      - name: Download youki binary
        uses: actions/download-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Install youki as runc in VM
        run: |
          chmod +x ./youki
          limactl cp youki default:/tmp/youki
          cat <<'EOS' | lima sudo bash -eux
          rm -f /usr/bin/runc /usr/local/bin/runc /usr/sbin/runc
          install -m 0755 /tmp/youki /usr/bin/runc
          runc --version
          EOS
      - name: Run containerd integration tests
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /root/containerd
          export RUNC_FLAVOR=youki
          export TEST_RUNTIME=io.containerd.runc.v2
          # The following tests are skipped because youki does not yet support:
          #
          # - TestCheckpoint: Checkpoint/restore functionality is not yet supported in youki.
          #   Tracking issue: https://github.com/youki-dev/youki/issues/142
          # - MultipleMap: youki currently does not support passing
          #   multiple ID mappings (uid/gid) in user namespaces.
          # - TestRuntimeInfo: youki currently does not implement the `containerd-shim-* -info`
          #   command expected by containerd v2+ for fetching runtime features.
          make integration TESTFLAGS="-timeout 40m -skip 'TestCheckpoint|TestRuntimeInfo|TestUserNamespaces/.*MultipleMap'"
          EOS

  k8s-tests:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 60
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (docker + just)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends docker.io just ca-certificates curl
          systemctl enable --now docker
          EOS
      - uses: actions/download-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Stage repo + youki in VM
        run: |
          chmod +x ./youki
          limactl cp -r . default:/tmp/youki
          limactl cp youki default:/tmp/youki/youki
      - name: Run kind tests in VM
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /tmp/youki
          chmod +x youki
          just test-kind
          EOS

  k8s-deploy-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: taiki-e/install-action@just
      - name: tools/youki-deploy multi-node installer
        run: just test-kind-deploy

  k8s-deploy-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: taiki-e/install-action@just
      - name: tools/youki-deploy multi-node installer
        run: just test-kind-deploy

  oci-validation-go:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (Go + just + libseccomp)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            just golang-go libseccomp-dev pkg-config make git build-essential
          EOS
      - uses: actions/download-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Stage repo + youki in VM
        run: |
          chmod +x ./youki
          limactl cp -r . default:/tmp/youki
          limactl cp youki default:/tmp/youki/youki
      - name: Run OCI validation (Go)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /tmp/youki
          chmod +x youki
          just test-oci
          EOS

  oci-validation-rust:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 40
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (Rust + just + criu)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential just pkg-config libseccomp-dev \
            make git software-properties-common
          add-apt-repository -y ppa:criu/ppa
          apt-get install -y criu
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          ln -sf /root/.cargo/bin/cargo /usr/local/bin/cargo
          ln -sf /root/.cargo/bin/rustc /usr/local/bin/rustc
          EOS
      - uses: actions/download-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Stage repo + youki in VM
        run: |
          chmod +x ./youki
          limactl cp -r . default:/tmp/youki
          limactl cp youki default:/tmp/youki/youki
      - name: Run OCI validation (Rust contest)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /tmp/youki
          chmod +x youki
          just test-contest
          EOS

  rootless-podman-test:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 40
    strategy:
      matrix:
        arch: [ "x86_64" ]
        libc: [ "gnu", "musl" ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (podman + Rust + criu)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            podman just curl ca-certificates build-essential pkg-config libseccomp-dev \
            make git uidmap software-properties-common
          add-apt-repository -y ppa:criu/ppa
          apt-get install -y criu
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          ln -sf /root/.cargo/bin/cargo /usr/local/bin/cargo
          ln -sf /root/.cargo/bin/rustc /usr/local/bin/rustc
          EOS
      - uses: actions/download-artifact@v4
      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install requirements
        run: sudo env PATH=$PATH just ci-prepare
      - name: Install CRIU from source
        run: |
          sudo apt-get install -y \
            libcap-dev libnet1-dev libnl-3-dev uuid-dev \
            libprotobuf-c-dev libprotobuf-dev protobuf-c-compiler protobuf-compiler
          git clone --depth 1 --branch criu-dev --single-branch \
            https://github.com/checkpoint-restore/criu.git ~/criu
          (cd ~/criu && sudo make -j $(nproc) install-criu)
          rm -rf ~/criu
          criu --version
      - name: Download youki binary
        uses: actions/download-artifact@v4
        with:
          name: youki-${{ matrix.arch }}-${{ matrix.libc }}
      - name: Stage repo + youki in VM
        run: |
          chmod +x ./youki
          limactl cp -r . default:/tmp/youki
          limactl cp youki default:/tmp/youki/youki
      - name: Run rootless podman test
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /tmp/youki
          chmod +x youki
          just test-rootless-podman
          EOS

  docker-in-docker:
    runs-on: ubuntu-24.04
    needs: [youki-build]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}-${{ env.LIMA_TEMPLATE }}
      - name: Start ${{ env.LIMA_TEMPLATE }} VM
        run: limactl start --plain --name=default template://${{ env.LIMA_TEMPLATE }}
      - name: Provision VM (docker + just)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          apt-get update
          apt-get install -y --no-install-recommends docker.io just ca-certificates curl
          systemctl enable --now docker
          EOS
      - uses: actions/download-artifact@v4
        with:
          name: youki-x86_64-musl
      - name: Stage repo + youki in VM
        run: |
          chmod +x ./youki
          limactl cp -r . default:/tmp/youki
          limactl cp youki default:/tmp/youki/youki
      - name: Run DinD test (cgroups-v2)
        run: |
          cat <<'EOS' | lima sudo bash -eux
          cd /tmp/youki
          chmod +x youki
          just test-dind
          EOS
